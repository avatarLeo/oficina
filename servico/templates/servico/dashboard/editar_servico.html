{% extends "servico/dashboard/base_dashboard.html" %}
{% block dash_content %}
<div class="dash-header">
    <a href="{% url 'dashboard_servico_detail' servico.id %}" class="back-link"><i class="fas fa-arrow-left"></i> Voltar</a>
    <h1>Editar Serviço #{{ servico.id }}</h1>
</div>

<form method="post" class="dash-form">
    {% csrf_token %}
    <div class="form-grid">
        <div class="form-group">
            <label class="form-label">Cliente <span class="required">*</span></label>
            <select name="cliente" required class="form-control">
                {% for c in clientes %}
                    <option value="{{ c.id }}" {% if c.id == servico.cliente_id %}selected{% endif %}>{{ c.nome }} — {{ c.telefone }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Valor (R$)</label>
            <input type="number" name="preco" step="0.01" min="0" class="form-control"
                   value="{{ servico.preco|floatformat:2 }}" placeholder="0,00">
        </div>
        <div class="form-group form-full">
            <label class="form-label">Descrição do Serviço <span class="required">*</span></label>
            <textarea name="descricao" required class="form-control form-textarea-lg" rows="5">{{ servico.descricao }}</textarea>
        </div>
        <div class="form-group form-full">
            <label class="form-label">Observações</label>
            <textarea name="observacoes" class="form-control" rows="3">{{ servico.observacoes }}</textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Previsão de Entrega</label>
            <input type="date" name="previsao_entrega" class="form-control"
                   value="{{ servico.previsao_entrega|date:'Y-m-d' }}">
        </div>
    </div>
    <div class="form-actions">
        <a href="{% url 'dashboard_servico_detail' servico.id %}" class="btn-cancel">Cancelar</a>
        <button type="submit" class="btn-submit-obs">Salvar Alterações</button>
    </div>
</form>
{% endblock %}
