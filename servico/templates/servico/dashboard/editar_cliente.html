{% extends "servico/dashboard/base_dashboard.html" %}
{% block dash_content %}
<div class="dash-header">
    <a href="{% url 'dashboard_clientes' %}" class="back-link"><i class="fas fa-arrow-left"></i> Voltar</a>
    <h1>Editar Cliente</h1>
</div>

<form method="post" class="dash-form">
    {% csrf_token %}
    <div class="form-grid">
        <div class="form-group">
            <label class="form-label">Nome <span class="required">*</span></label>
            <input type="text" name="nome" required class="form-control" value="{{ cliente.nome }}" placeholder="Nome completo">
        </div>
        <div class="form-group">
            <label class="form-label">Telefone <span class="required">*</span></label>
            <input type="text" name="telefone" required class="form-control telefone-mask" value="{{ cliente.telefone }}" placeholder="(xx) xxxxx-xxxx" maxlength="15">
        </div>
        <div class="form-group">
            <label class="form-label">CPF</label>
            <input type="text" name="cpf" class="form-control cpf-mask" value="{{ cliente.cpf|default:'' }}" placeholder="000.000.000-00" maxlength="14">
            <div class="cpf-feedback" id="cpf-feedback"></div>
        </div>
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" value="{{ cliente.email|default:'' }}" placeholder="email@exemplo.com">
        </div>
    </div>
    <div class="form-actions">
        <a href="{% url 'dashboard_clientes' %}" class="btn-cancel">Cancelar</a>
        <button type="submit" class="btn-submit-obs">Salvar</button>
    </div>
</form>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const telefoneInput = document.querySelector('.telefone-mask');
    if (telefoneInput) {
        telefoneInput.addEventListener('input', function (e) {
            let v = e.target.value.replace(/\D/g, '').slice(0, 11);
            if (v.length > 10) {
                v = v.replace(/^(\d{2})(\d{5})(\d{4})$/, '($1) $2-$3');
            } else if (v.length > 6) {
                v = v.replace(/^(\d{2})(\d{4})(\d{0,4})$/, '($1) $2-$3');
            } else if (v.length > 2) {
                v = v.replace(/^(\d{2})(\d{0,5})$/, '($1) $2');
            } else if (v.length) {
                v = v.replace(/^(\d{0,2})$/, '($1');
            }
            e.target.value = v;
        });
    }

    const cpfInput = document.querySelector('.cpf-mask');
    if (cpfInput) {
        cpfInput.addEventListener('input', function () {
            let v = this.value.replace(/\D/g, '').slice(0, 11);
            this.value = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
        });
    }
});
</script>
{% endblock %}
