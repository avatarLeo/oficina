{% extends "servico/dashboard/base_dashboard.html" %}
{% block dash_content %}
<div class="dash-header">
    <a href="{% url 'dashboard_servicos' %}" class="back-link"><i class="fas fa-arrow-left"></i> Voltar</a>
    <h1>Novo Serviço</h1>
</div>

<form method="post" class="dash-form">
    {% csrf_token %}
    <div class="form-grid">
        <div class="form-group">
            <label class="form-label">Cliente <span class="required">*</span></label>
            <select name="cliente" required class="form-control">
                <option value="">Selecione um cliente</option>
                {% for c in clientes %}
                    <option value="{{ c.id }}">{{ c.nome }} — {{ c.telefone }}</option>
                {% endfor %}
            </select>
            <a href="{% url 'dashboard_add_cliente' %}" target="_blank" class="form-help">
                <i class="fas fa-plus"></i> Cadastrar novo cliente
            </a>
        </div>
        <div class="form-group form-full">
            <label class="form-label">Descrição do Serviço <span class="required">*</span></label>
            <textarea name="descricao" required class="form-control form-textarea-lg" placeholder="Descreva o serviço a ser realizado..." rows="5"></textarea>
        </div>
        <div class="form-group form-full">
            <label class="form-label">Observações</label>
            <textarea name="observacoes" class="form-control" placeholder="Observações adicionais..." rows="3"></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Previsão de Entrega</label>
            <input type="date" name="previsao_entrega" class="form-control" value="">
            <span class="form-help">Deixe em branco para definir 4 dias a partir de hoje</span>
        </div>
        <div class="form-group">
            <label class="form-label">Valor (R$)</label>
            <input type="number" name="preco" step="0.01" min="0" class="form-control" placeholder="0,00">
        </div>
    </div>
    <div class="form-actions">
        <a href="{% url 'dashboard_servicos' %}" class="btn-cancel">Cancelar</a>
        <button type="submit" class="btn-submit-obs">Salvar Serviço</button>
    </div>
</form>
{% endblock %}
